name = "cinaadmin"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".next"

# Non-secret vars. Secrets (CINAUTH_ADMIN_SERVICE_KEY, etc.) are set via
# `wrangler pages secret put` / the Cloudflare dashboard.
[vars]
NEXT_PUBLIC_APP_NAME = "CinaGroup Admin"
# API host (Worker: cinaauth-api) — session check + admin API calls.
NEXT_PUBLIC_CINAUTH_BASE_URL = "https://auth.cinagroup.com"
CINAUTH_BASE_URL = "https://auth.cinagroup.com"
# Frontend host (Worker: cinaauth-demo) — login/sign-out page redirects.
NEXT_PUBLIC_CINAUTH_AUTH_URL = "https://demo-auth.cinagroup.com"
CINAUTH_AUTH_URL = "https://demo-auth.cinagroup.com"
CINAADMIN_ALLOWED_ROLES = "super_admin,security_admin"
